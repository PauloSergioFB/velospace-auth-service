# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: 'Build and deploy JAR app to Azure Web App: velospace-auth-service'

on:
  push:
    branches:
    - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Java version
      uses: actions/setup-java@v1
      with:
        java-version: '21'
    
    - name: Build with Maven
      run: mvn clean install
      env:
        JWT_SECRET: ${{ secrets.JWT_SECRET }}

        DB_URL: ${{ secrets.DB_URL }}
        DB_USERNAME: ${{ secrets.DB_USERNAME }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        
        ACTIVEMQ_BROKER_URL: ${{ secrets.ACTIVEMQ_BROKER_URL }}
        ACTIVEMQ_USER: ${{ secrets.ACTIVEMQ_USER }}
        ACTIVEMQ_PASSWORD: ${{ secrets.ACTIVEMQ_PASSWORD }}
        
        INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
        
        OPERATION_SERVICE_URL: ${{ secrets.OPERATION_SERVICE_URL }}
        
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with: 
        app-name: 'velospace-auth-service'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_82c6f50f367e44fa9c53dd9c98c3e961 }}
        package: '${{ github.workspace }}/VeloSpace/target/*.jar'
